<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roomigo Local - Questionnaire</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background-color: #F4F1EA; padding: 60px 20px; color: #2A4032; }
.container { max-width: 820px; margin: auto; background: rgba(255, 255, 255, 0.4); padding: 50px; border-radius: 24px; backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 10px 40px rgba(42, 64, 50, 0.1); }
h1 { text-align: center; margin-bottom: 40px; color: #1E3829; font-size: 32px; }
.section { margin-bottom: 30px; background: rgba(255, 255, 255, 0.25); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.5); }
.section h2 { margin-bottom: 15px; color: #355C47; font-size: 20px; border-bottom: 2px solid rgba(85, 139, 110, 0.2); padding-bottom: 8px; }
input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(85, 139, 110, 0.3); background: rgba(255, 255, 255, 0.65); outline: none; }
button { width: 100%; padding: 16px; border: none; border-radius: 50px; background: #558B6E; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;}
</style>
</head>
<body>
<div class="container">
    <h1>Local Roommate Preferences</h1>
    <div class="section">
        <h2>Basic Information</h2>
        <input id="name" type="text" placeholder="Full Name">
        <input id="college" type="text" placeholder="College / Workplace">
        <input id="city" type="text" placeholder="Target City (e.g., Pune, Mumbai)" required>
    </div>
    <div class="section">
        <h2>Accommodation</h2>
        <select id="accommodation"><option value="">Accommodation Type</option><option>Hostel</option><option>PG</option><option>Flat</option></select>
        <input id="budget" type="number" placeholder="Rent Budget (₹)">
    </div>
    <div class="section">
        <h2>Lifestyle</h2>
        <select id="personality"><option value="">Personality</option><option>Studious</option><option>Party</option><option>Calm</option></select>
        <select id="cleanliness"><option value="">Cleanliness</option><option>Very Clean</option><option>Messy</option></select>
        <select id="sleep"><option value="">Sleep Schedule</option><option>Early Sleeper</option><option>Night Owl</option></select>
        <input id="phone" type="text" placeholder="Phone Number (Required)">
    </div>
    <button onclick="saveLocalForm()">Save & View Matches</button>
</div>
</body>
</html>
