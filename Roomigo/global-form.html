<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roomigo Global - Questionnaire</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background-color: #F4F1EA; padding: 60px 20px; color: #2C5282; }
.container { max-width: 820px; margin: auto; background: rgba(255, 255, 255, 0.4); padding: 50px; border-radius: 24px; backdrop-filter: blur(16px); border: 1px solid rgba(74, 144, 226, 0.3); box-shadow: 0 10px 40px rgba(74, 144, 226, 0.05); }
h1 { text-align: center; margin-bottom: 40px; color: #1A365D; font-size: 32px; }
.section { margin-bottom: 30px; background: rgba(255, 255, 255, 0.5); padding: 25px; border-radius: 16px; border: 1px solid rgba(74, 144, 226, 0.2); }
.section h2 { margin-bottom: 15px; color: #2C5282; font-size: 20px; border-bottom: 2px solid rgba(74, 144, 226, 0.2); padding-bottom: 8px; }
input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(74, 144, 226, 0.3); background: rgba(255, 255, 255, 0.8); outline: none; }
button { width: 100%; padding: 16px; border: none; border-radius: 50px; background: #4A90E2; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;}
</style>
</head>
<body>
<div class="container">
    <h1>International Preferences</h1>
    <div class="section">
        <h2>Migration Details</h2>
        <input id="name" type="text" placeholder="Full Name">
        <input id="countryOfOrigin" type="text" placeholder="Country of Origin (e.g., India)" required>
        <input id="targetCountry" type="text" placeholder="Target Country/City (e.g., London, UK)" required>
        <input id="motherTongue" type="text" placeholder="Native Language (e.g., Hindi)">
        <input id="university" type="text" placeholder="International University/Company">
    </div>
    <div class="section">
        <h2>Living Preferences</h2>
        <select id="accommodation"><option value="">Accommodation Type</option><option>On-Campus</option><option>Off-Campus Shared</option></select>
        <input id="budget" type="number" placeholder="Budget (in Target Currency, e.g., $ / £)">
        <select id="personality"><option value="">Personality</option><option>Studious</option><option>Outgoing</option></select>
        <select id="cleanliness"><option value="">Cleanliness</option><option>Very Clean</option><option>Flexible</option></select>
        <input id="phone" type="text" placeholder="WhatsApp Number (Required)">
    </div>
    <button onclick="saveGlobalForm()">Save & View Global Matches</button>
</div>
</body>
</html>
