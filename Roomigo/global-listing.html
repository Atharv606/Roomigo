<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomigo Global - Listings</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background-color: #F4F1EA; color: #2C5282; min-height: 100vh; }
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(74, 144, 226, 0.2); position: sticky; top: 0; z-index: 100;}
.title { font-size: 26px; color: #1A365D; font-weight: 700; }
.title span { color: #4A90E2; }
.menu-btns button { background: transparent; border: 1px solid #4A90E2; padding: 8px 15px; border-radius: 20px; color: #4A90E2; font-weight: bold; cursor: pointer; margin-left: 10px;}
.menu-btns button.danger { background: #d9534f; border: none; color: white; }
.main-content { padding: 40px 20px; }
.list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1100px; margin: auto; }
.card { background: rgba(255, 255, 255, 0.6); border-radius: 20px; padding: 30px 25px; text-align: center; display: flex; flex-direction: column; position: relative; border: 1px solid rgba(74, 144, 226, 0.3); box-shadow: 0 8px 32px rgba(74, 144, 226, 0.05);}
.trust-badge { position: absolute; top: 15px; left: 15px; background: #e0f0ff; color: #0b5ed7; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
.like-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer; color: #ccc; }
.like-btn.liked { color: #e63946; }
.avatar { width: 85px; height: 85px; border-radius: 50%; background: #fff; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600; border: 2px solid #4A90E2; overflow: hidden; color: #4A90E2;}
.btn-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
.btn { width: 100%; padding: 10px; border-radius: 20px; background: #4A90E2; color: white; border: none; font-weight: bold; cursor: pointer;}
.btn-outline { background: transparent; border: 1px solid #4A90E2; color: #4A90E2; }
</style>
</head>
<body>
<header class="navbar">
    <div class="title">Room<span>igo</span> Global</div>
    <div class="menu-btns">
        <button onclick="window.location='myprofile.html'">⚙️ Profile</button>
        <button onclick="window.location='favorites.html'">❤️ Liked</button>
        <button class="danger" onclick="logout()">Logout</button>
    </div>
</header>
<main class="main-content"><div id="list" class="list-container"></div></main>

<script>
let likedProfiles = JSON.parse(localStorage.getItem("likedProfiles_global")) || [];

auth.onAuthStateChanged(user => {
    if(!user) return window.location="global-login.html";
    
    // Fetch Current User Data to apply Global Filtering
    db.collection("users_global").doc(user.uid).get().then(myDoc => {
        let myData = myDoc.exists ? myDoc.data() : {};

        db.collection("users_global").get().then(snapshot => {
            const list = document.getElementById("list");
            let allUsers = [];

            snapshot.forEach(doc => {
                if(doc.id !== user.uid) allUsers.push({id: doc.id, ...doc.data()});
            });

            // Apply Cultural/Location Filter
            const filteredUsers = filterGlobalMatches(myData, allUsers);

            filteredUsers.forEach(d => {
                const firstLetter = (d.name || "U").charAt(0).toUpperCase();
                const isLiked = likedProfiles.includes(d.id) ? 'liked' : '';
                const heartIcon = isLiked ? '❤️' : '🤍';
                const trustScore = calculateTrustScore(d);

                list.innerHTML += `
                    <div class="card">
                        <div class="trust-badge">🛡️ Trust: ${trustScore}%</div>
                        <button class="like-btn ${isLiked}" id="btn-${d.id}" onclick="toggleLike('${d.id}')">${heartIcon}</button>
                        <div class="avatar">${d.photoURL ? `<img src="${d.photoURL}" style="width:100%;height:100%;object-fit:cover;">` : firstLetter}</div>
                        <h3 style="margin-bottom:5px; color: #1A365D;">${d.name || "Unknown"}</h3>
                        <p style="color:#4A90E2; font-size:13px; font-weight:bold; margin-bottom:15px;">From: ${d.countryOfOrigin || "-"}</p>
                        <div style="font-size:14px; display:flex; justify-content:space-between; padding:0 10px;"><span>Moving to:</span> <b>${d.targetCountry || "-"}</b></div>
                        <div style="font-size:14px; display:flex; justify-content:space-between; padding:0 10px;"><span>Language:</span> <b>${d.motherTongue || "-"}</b></div>
                        <div class="btn-group">
                            <button class="btn" onclick="openProfile('${d.id}')">View Profile</button>
                            <button class="btn btn-outline" onclick="compareUser('${d.id}')">Compare</button>
                        </div>
                    </div>`;
            });
        });
    });
});

function toggleLike(id) {
    const btn = document.getElementById(`btn-${id}`);
    if (likedProfiles.includes(id)) {
        likedProfiles = likedProfiles.filter(pId => pId !== id);
        btn.classList.remove('liked'); btn.innerText = '🤍';
    } else {
        likedProfiles.push(id);
        btn.classList.add('liked'); btn.innerText = '❤️';
    }
    localStorage.setItem("likedProfiles_global", JSON.stringify(likedProfiles));
}
function openProfile(id){ localStorage.setItem("view_profile_id", id); window.location = "profile.html"; }
function compareUser(id){ localStorage.setItem("compare_id", id); window.location = "compare.html"; }
</script>
</body>
</html>
