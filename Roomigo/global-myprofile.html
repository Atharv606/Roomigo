<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roomigo Global - My Profile</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #F4F1EA; padding: 40px 20px; color: #2C5282;}
.container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(74, 144, 226, 0.2); }
.avatar { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid #4A90E2; margin-bottom: 20px;}
.edit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; text-align: left;}
input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
button { width: 100%; padding: 15px; background: #4A90E2; color: white; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
.trust-panel { background: #e0f0ff; padding: 15px; border-radius: 10px; margin: 20px 0; font-weight: bold; color: #0b5ed7;}
</style>
</head>
<body>
<div class="container">
    <button onclick="window.location='global-listings.html'" style="background:none; border:none; color:#4A90E2; cursor:pointer; width:auto; text-align:left; padding:0; margin-bottom:20px; font-weight:bold;">← Back to Global Feed</button>
    <h2 style="color:#4A90E2;">My Global Profile</h2>
    <img id="profilePhoto" src="https://via.placeholder.com/130" class="avatar">
    <br><input type="file" id="photoInput" accept="image/*" style="border: none; width: auto; text-align:center;">
    
    <div class="trust-panel" id="trustPanel">🛡️ Trust Score: Calculating...</div>

    <div class="edit-grid">
        <input id="name" placeholder="Full Name">
        <input id="phone" placeholder="WhatsApp Number">
        <input id="countryOfOrigin" placeholder="Country of Origin">
        <input id="targetCountry" placeholder="Target Country/City">
        <input id="motherTongue" placeholder="Native Language">
        <input id="university" placeholder="International University">
        <select id="accommodation"><option value="">Accommodation</option><option>On-Campus</option><option>Off-Campus Shared</option></select>
        <input id="budget" type="number" placeholder="Budget">
        <select id="personality"><option value="">Personality</option><option>Studious</option><option>Outgoing</option></select>
        <select id="cleanliness"><option value="">Cleanliness</option><option>Very Clean</option><option>Flexible</option></select>
    </div>
    <button onclick="updateProfile()">Save Global Changes</button>
</div>

<script>
let base64ImageToSave = null;
document.getElementById('photoInput').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 250; canvas.height = 250;
      canvas.getContext('2d').drawImage(img, 0, 0, 250, 250);
      base64ImageToSave = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('profilePhoto').src = base64ImageToSave;
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

auth.onAuthStateChanged(user => {
  if (!user) return window.location = "global-login.html";
  db.collection("users_global").doc(user.uid).get().then(doc => {
    if (doc.exists) {
      const d = doc.data();
      if (d.photoURL) document.getElementById("profilePhoto").src = d.photoURL;
      
      document.getElementById("name").value = d.name || "";
      document.getElementById("phone").value = d.phone || "";
      document.getElementById("countryOfOrigin").value = d.countryOfOrigin || "";
      document.getElementById("targetCountry").value = d.targetCountry || "";
      document.getElementById("motherTongue").value = d.motherTongue || "";
      document.getElementById("university").value = d.university || "";
      document.getElementById("accommodation").value = d.accommodation || "";
      document.getElementById("budget").value = d.budget || "";
      document.getElementById("personality").value = d.personality || "";
      document.getElementById("cleanliness").value = d.cleanliness || "";

      document.getElementById("trustPanel").innerText = `🛡️ Trust Score: ${calculateTrustScore(d)}%`;
    }
  });
});

function updateProfile() {
  const user = auth.currentUser; if (!user) return;
  
  let profileData = {
    name: document.getElementById("name").value, phone: document.getElementById("phone").value,
    countryOfOrigin: document.getElementById("countryOfOrigin").value, targetCountry: document.getElementById("targetCountry").value,
    motherTongue: document.getElementById("motherTongue").value, university: document.getElementById("university").value,
    accommodation: document.getElementById("accommodation").value, budget: document.getElementById("budget").value,
    personality: document.getElementById("personality").value, cleanliness: document.getElementById("cleanliness").value
  };

  if (base64ImageToSave) profileData.photoURL = base64ImageToSave;

  db.collection("users_global").doc(user.uid).set(profileData, { merge: true })
    .then(() => { alert("Updated Successfully!"); location.reload(); })
    .catch(e => alert(e.message));
}
</script>
</body>
</html>
